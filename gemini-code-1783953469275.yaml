name: Generate YouTube Script

on:
  workflow_dispatch: # بيسمح لك تشغل السكريبت يدوياً من صفحة Actions

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run script
      env:
        XAI_API_KEY: ${{ secrets.XAI_API_KEY }} # بيمرر المفتاح اللي أنت لسه ضايفه حالاً
      run: |
        python generate_topic_and_script.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add script_output.txt used_topics.json
        git diff --staged --quiet || (git commit -m "تحديث تلقائي: توليد سكريبت حلقة جديدة" && git push)